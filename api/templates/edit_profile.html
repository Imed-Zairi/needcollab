{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width:560px;">
    <div data-aos="fade-up">
        <a href="/profile" class="text-secondary text-decoration-none small mb-4 d-inline-block">
            <i class="bi bi-arrow-left me-1"></i>Retour au profil
        </a>
        <div class="nc-card">
            <div class="text-center mb-4">
                <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:#fff;margin:0 auto 16px;">
                    {{ profile.username[0].upper() }}
                </div>
                <h2 class="text-white fw-bold mb-1">Modifier le profil</h2>
                <p class="text-secondary small">Mettez à jour vos informations personnelles.</p>
            </div>

            {% if error %}
            <div class="alert-auth mb-4"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input name="username" class="form-control" value="{{ profile.username }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input name="email" type="email" class="form-control" value="{{ profile.email or '' }}" placeholder="vous@exemple.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Localisation</label>
                    <input name="location" class="form-control" value="{{ profile.location or '' }}" placeholder="Paris, France">
                </div>
                <div class="mb-4">
                    <label class="form-label">Bio</label>
                    <textarea name="bio" class="form-control" rows="3" placeholder="Parlez-nous de vous...">{{ profile.bio or '' }}</textarea>
                </div>
                <div class="d-flex gap-3">
                    <a href="/profile" class="btn btn-outline-light flex-fill py-3">Annuler</a>
                    <button type="submit" class="btn btn-primary flex-fill py-3">
                        <i class="bi bi-check-lg me-2"></i>Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
