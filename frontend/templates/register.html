{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width:460px;">
    <div data-aos="fade-up">
        <div class="nc-card">
            <div class="text-center mb-4">
                <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                    <i class="bi bi-person-plus-fill text-white fs-4"></i>
                </div>
                <h2 class="text-white fw-bold mb-1">Créer un compte</h2>
                <p class="text-secondary small">Rejoignez la communauté NeedCollab.</p>
            </div>

            {% if error %}
            <div class="alert-auth mb-4"><i class="bi bi-exclamation-circle me-2"></i>{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input name="username" class="form-control" placeholder="votre_pseudo" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email <span class="text-secondary fw-normal">(optionnel)</span></label>
                    <input name="email" type="email" class="form-control" placeholder="vous@exemple.com">
                </div>
                <div class="mb-4">
                    <label class="form-label">Mot de passe</label>
                    <input name="password" type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fs-6">
                    <i class="bi bi-person-check-fill me-2"></i>Créer mon compte
                </button>
            </form>

            <p class="text-center text-secondary small mt-4 mb-0">
                Déjà un compte ?
                <a href="/login" style="color:var(--primary);text-decoration:none;font-weight:600;">Se connecter</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
