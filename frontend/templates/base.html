<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeedCollab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-dark: #574fd6;
            --accent: #ff6584;
            --dark: #0f0e17;
            --card-bg: #1a1a2e;
            --surface: #16213e;
        }

        * { scroll-behavior: smooth; }

        body {
            background: var(--dark);
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(15, 14, 23, 0.85) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(108, 99, 255, 0.2);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .nav-link { color: #aaa !important; transition: color .2s; }
        .nav-link:hover { color: #fff !important; }

        /* BUTTONS */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform .2s, box-shadow .2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
        }
        .btn-outline-light {
            border-radius: 10px;
            font-weight: 600;
            transition: transform .2s;
        }
        .btn-outline-light:hover { transform: translateY(-2px); }

        /* CARDS */
        .nc-card {
            background: var(--card-bg);
            border: 1px solid rgba(108, 99, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            transition: transform .3s, box-shadow .3s, border-color .3s;
        }
        .nc-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(108, 99, 255, 0.2);
            border-color: rgba(108, 99, 255, 0.5);
        }

        /* BADGE */
        .badge-collab {
            background: rgba(108, 99, 255, 0.15);
            color: var(--primary);
            border: 1px solid rgba(108, 99, 255, 0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .badge-offer {
            background: rgba(255, 101, 132, 0.15);
            color: var(--accent);
            border: 1px solid rgba(255, 101, 132, 0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        /* FORMS */
        .form-control, .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(108, 99, 255, 0.2);
            color: #e0e0e0;
            border-radius: 10px;
            padding: 12px 16px;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.2);
            color: #fff;
        }
        .form-label { color: #bbb; font-weight: 600; font-size: 0.9rem; }

        /* SECTION */
        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
        }
        .section-title span {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GLOW */
        .glow-dot {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(108,99,255,0.15), transparent 70%);
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            top: -100px; right: -100px;
            z-index: 0;
        }

        /* VOTE BARS */
        .vote-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
        .vote-bar-fill-accept { height: 100%; background: linear-gradient(90deg, #22c55e, #16a34a); border-radius: 3px; transition: width .6s ease; }
        .vote-bar-fill-reject { height: 100%; background: linear-gradient(90deg, #ef4444, #dc2626); border-radius: 3px; transition: width .6s ease; }

        /* PRICE TAG */
        .price-tag {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* FOOTER */
        footer {
            border-top: 1px solid rgba(108, 99, 255, 0.1);
            color: #555;
            font-size: 0.85rem;
        }

        /* PULSE ANIMATION */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .pulse-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .pulse-icon::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(108, 99, 255, 0.3);
            animation: pulse-ring 1.8s ease-out infinite;
        }

        /* FADE UP */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp .6s ease forwards; }

        /* COUNTER */
        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="glow-dot"></div>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-people-fill me-1"></i>NeedCollab
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <i class="bi bi-list text-white fs-4"></i>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link" href="/">Besoins</a></li>
                    <li class="nav-item">
                        <a class="btn btn-primary px-4" href="/needs/create">
                            <i class="bi bi-plus-lg me-1"></i>Créer un besoin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <footer class="py-4 mt-5 text-center">
        <div class="container">
            <span class="navbar-brand" style="font-size:1rem;">NeedCollab</span>
            <span class="ms-2">— Ensemble, on négocie mieux.</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 700, once: true, offset: 60 });

        // Glow dot follows mouse
        const glow = document.querySelector('.glow-dot');
        document.addEventListener('mousemove', e => {
            glow.style.left = (e.clientX - 150) + 'px';
            glow.style.top = (e.clientY - 150) + 'px';
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
