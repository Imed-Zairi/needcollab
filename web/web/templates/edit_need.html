{% extends "base.html" %}
{% block content %}
<div class="container py-5" style="max-width:600px;">
    <div data-aos="fade-up">
        <a href="/needs/{{ need.id }}" class="text-secondary text-decoration-none small mb-4 d-inline-block">
            <i class="bi bi-arrow-left me-1"></i>Retour au besoin
        </a>
        <div class="nc-card">
            <div class="text-center mb-4">
                <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                    <i class="bi bi-pencil-square text-white fs-4"></i>
                </div>
                <h2 class="text-white fw-bold mb-1">Modifier le besoin</h2>
                <p class="text-secondary small">Mettez à jour le titre et la description.</p>
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label">Titre</label>
                    <input name="title" class="form-control" value="{{ need.title }}" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4" required>{{ need.description }}</textarea>
                </div>
                <div class="d-flex gap-3">
                    <a href="/needs/{{ need.id }}" class="btn btn-outline-light flex-fill py-3">Annuler</a>
                    <button type="submit" class="btn btn-primary flex-fill py-3">
                        <i class="bi bi-check-lg me-2"></i>Enregistrer
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
